<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Repo Security Scanner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">🛡️ Repo Security Scanner</div>
    <button class="nav-btn" onclick="openModal()">Login / Register</button>
</nav>

<section class="hero" id="heroSection">
    <h1>Scan GitHub Repositories for Security Risks</h1>
    <p>Detect secrets, vulnerabilities, and security issues instantly.</p>

    <div class="input-hero locked">
        <input type="text" placeholder="🔒 Login to scan repositories" disabled>
        <button disabled>Analyze</button>
    </div>
</section>

<div id="analyzeSection" class="analyze-card" style="display:none;">
    <div class="top-bar">
        <h2>🔍 Analyze Repository</h2>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="input-box">
        <input type="text" id="repoUrl" placeholder="Paste GitHub repo URL">
        <button onclick="analyzeRepo()">Scan</button>
    </div>

    <div id="result"></div>
</div>

<!-- MODAL -->
<div class="modal" id="authModal">
    <div class="modal-card">

        <div class="modal-tabs">
            <button onclick="showLogin()">Login</button>
            <button onclick="showRegister()">Register</button>
            <span class="close" onclick="closeModal()">×</span>
        </div>

        <div id="loginBox">
            <input type="email" id="login_email" placeholder="Email">
            <input type="password" id="login_password" placeholder="Password">
            <button onclick="login()">Login</button>
        </div>

        <div id="registerBox" style="display:none;">
            <input type="text" id="reg_username" placeholder="Username">
            <input type="email" id="reg_email" placeholder="Email">
            <input type="password" id="reg_password" placeholder="Password">
            <button onclick="register()">Register</button>
        </div>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
